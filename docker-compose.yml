services:
  db:
    image: postgres:17-alpine
    container_name: gbsw-platform-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gbsw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gbsw}
      POSTGRES_DB: ${POSTGRES_DB:-gbsw_platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-gbsw} -d ${POSTGRES_DB:-gbsw_platform}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gbsw-platform-pgadmin
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@gbsw.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-gbswadmin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/gbsw-servers.json:ro

volumes:
  postgres-data:
  pgadmin-data:
